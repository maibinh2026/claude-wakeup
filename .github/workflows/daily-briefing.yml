name: Daily Briefing (ICT Schedule)

# ─────────────────────────────────────────────────────────────────
# Lịch tự động (ICT = UTC+7):
#   03:50 ICT → 20:50 UTC   thời tiết hôm nay
#   09:00 ICT → 02:00 UTC   giá vàng SJC
#   14:10 ICT → 07:10 UTC   tỷ giá USD/VNĐ
#   19:20 ICT → 12:20 UTC   dự báo thời tiết ngày mai
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '50 20 * * *'   # 03:50 ICT
    - cron: '0 2 * * *'     # 09:00 ICT
    - cron: '10 7 * * *'    # 14:10 ICT
    - cron: '20 12 * * *'   # 19:20 ICT

  workflow_dispatch:
    inputs:
      task:
        description: 'Chọn task (để trống = tự detect từ giờ UTC hiện tại)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - weather_today
          - gold_price
          - usd_rate
          - weather_tomorrow

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # FIX: Node.js 24 bắt buộc từ 16/6/2026 trên GitHub Actions runners
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --upgrade anthropic requests

      - name: Resolve task from schedule or manual input
        id: resolve
        shell: bash
        run: |
          OVERRIDE="${{ inputs.task }}"

          if [[ -n "$OVERRIDE" ]]; then
            echo "task=$OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "→ Manual override: $OVERRIDE"
          else
            H=$(date -u +"%H")
            echo "→ UTC hour hiện tại: $H"
            case "$H" in
              "20"|"21") TASK="weather_today"    ;;   # 03:50–04:59 ICT
              "02"|"03") TASK="gold_price"        ;;   # 09:00–10:59 ICT
              "07"|"08") TASK="usd_rate"          ;;   # 14:10–15:59 ICT
              "12"|"13") TASK="weather_tomorrow"  ;;   # 19:20–20:59 ICT
              *)
                echo "⚠️ UTC hour $H không khớp schedule — fallback: weather_today"
                TASK="weather_today"
                ;;
            esac
            echo "task=$TASK" >> "$GITHUB_OUTPUT"
            echo "→ Task đã resolve: $TASK"
          fi

      - name: Run daily briefing
        run: python scripts/daily_briefing.py "${{ steps.resolve.outputs.task }}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
